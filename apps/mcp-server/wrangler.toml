name = "on-record-mcp"
main = "src/worker.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "on-record-cache"
database_id = "877ea9f0-a442-4bbd-81a4-2701bc29a143"

[[ratelimits]]
name = "RATE_LIMITER"
namespace_id = "1001"

  [ratelimits.simple]
  limit = 60
  period = 60

[durable_objects]
bindings = [{ name = "MCP_OBJECT", class_name = "OnRecordMCP" }]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["OnRecordMCP"]

routes = [
  { pattern = "agents.getonrecord.org", custom_domain = true }
]

[vars]
BILL_STALE_SECONDS_IN_SESSION = "3600"
BILL_STALE_SECONDS_OUT_OF_SESSION = "86400"
CACHE_REFRESH_WALL_TIME_SECONDS = "0"

[triggers]
crons = ["0 6 * * *", "0 * * * *"]
